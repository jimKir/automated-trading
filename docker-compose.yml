version: "3.9"

# ============================================================
#  docker-compose.yml
#  Local development + testing before pushing to AWS
# ============================================================
services:
  trading:
    build: .
    container_name: trading_paper
    restart: unless-stopped
    command: python main.py paper

    env_file:
      - .env                        # copy from .env.example and fill in

    volumes:
      - ./results:/app/results      # persist reports & state on host
      - ./logs:/app/logs            # persist logs on host
      - ./config:/app/config        # mount config so you can edit without rebuilding

    ports:
      - "8080:8080"                 # health check endpoint

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Daily report job — runs once then exits
  # Trigger manually or via cron:  docker-compose run --rm reporter
  reporter:
    build: .
    container_name: trading_reporter
    profiles: ["reporter"]          # not started by default
    command: python daily_report.py --email --s3

    env_file:
      - .env

    volumes:
      - ./results:/app/results
      - ./config:/app/config
