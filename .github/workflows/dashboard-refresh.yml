name: Dashboard Refresh

on:
  schedule:
    - cron: '*/15 13-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh Dashboard Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet requests pandas numpy yfinance

      - name: Build snapshot
        env:
          APCA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY }}
          APCA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET }}
        run: python scripts/build_dashboard_snapshot.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/snapshot.json
          git diff --cached --quiet || git commit -m "chore: refresh dashboard data (auto) [skip ci]"
          git push
