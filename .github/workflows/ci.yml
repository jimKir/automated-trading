name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff
      - name: Lint
        run: ruff check . --exclude venv,__pycache__,.git || true
      - name: Format check
        run: ruff format --check . --exclude venv,__pycache__,.git || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          pip install --quiet -r requirements.txt
          pip install --quiet -e .
      - name: Run tests
        run: pytest tests/ -v --tb=short -x 2>&1 | tail -40

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t trading-bot:test .
      - name: Smoke test image
        run: |
          docker run --rm trading-bot:test \
            python -c "from execution.live_engine import LiveEngine; print('OK')"

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: paper-trading
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG:     ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/trading-bot:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/trading-bot:$IMAGE_TAG \
                      $ECR_REGISTRY/trading-bot:latest
          docker push $ECR_REGISTRY/trading-bot:$IMAGE_TAG
          docker push $ECR_REGISTRY/trading-bot:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform init + apply
        working-directory: infra/terraform/aws
        env:
          TF_VAR_alpaca_api_key:    ${{ secrets.ALPACA_API_KEY }}
          TF_VAR_alpaca_api_secret: ${{ secrets.ALPACA_API_SECRET }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Force new ECS deployment
        run: |
          CLUSTER=$(aws ecs list-clusters --region eu-north-1 \
            --query 'clusterArns[?contains(@,`trading-bot`)]' \
            --output text | xargs -I{} aws ecs describe-clusters \
            --clusters {} --query 'clusters[0].clusterName' \
            --output text --region eu-north-1)
          SERVICE=$(aws ecs list-services --cluster $CLUSTER --region eu-north-1 \
            --query 'serviceArns[0]' --output text | sed 's|.*/||')
          aws ecs update-service \
            --cluster $CLUSTER --service $SERVICE \
            --force-new-deployment --region eu-north-1
          echo "Deployed to ECS: $CLUSTER / $SERVICE"

      - name: Deployment summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Mode: paper trading" >> $GITHUB_STEP_SUMMARY
          echo "- Region: eu-north-1" >> $GITHUB_STEP_SUMMARY
          echo "- Tail logs: \`aws logs tail /ecs/trading-bot-paper --follow --region eu-north-1\`" >> $GITHUB_STEP_SUMMARY
