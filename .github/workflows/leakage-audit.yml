name: Leakage Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: leakage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Run ruff
        run: |
          ruff check . 2>&1 | tee ruff_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Summary
        if: always()
        run: |
          echo "### Ruff Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -s ruff_output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -40 ruff_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "All checks passed \u2705" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if lint errors
        if: env.exit_code != '0'
        run: exit 1

  leakage-tests:
    name: Future Knowledge Leakage Tests (46 checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet pytest numpy pandas yfinance pyarrow

      - name: Run leakage audit
        run: |
          python -m pytest tests/test_leakage_audit.py -v --tb=short 2>&1 | tee leakage_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Summary
        if: always()
        run: |
          echo "### Leakage Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "PASSED|FAILED|ERROR|passed|failed" leakage_output.txt | tail -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail if tests failed
        if: env.exit_code != '0'
        run: exit 1

  # ── Terraform state drift check ────────────────────────────────────────────
  terraform-drift:
    name: Terraform Drift Check (paper)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform init + import
        working-directory: infra/terraform/aws
        env:
          TF_VAR_alpaca_api_key:    ${{ secrets.ALPACA_API_KEY }}
          TF_VAR_alpaca_api_secret: ${{ secrets.ALPACA_API_SECRET }}
        run: |
          terraform init -input=false
          terraform workspace select paper || terraform workspace new paper
          bash import_existing.sh paper

      - name: Terraform plan (drift detect)
        id: drift
        working-directory: infra/terraform/aws
        env:
          TF_VAR_alpaca_api_key:    ${{ secrets.ALPACA_API_KEY }}
          TF_VAR_alpaca_api_secret: ${{ secrets.ALPACA_API_SECRET }}
        run: |
          set +e
          terraform plan -detailed-exitcode -input=false \
            -var-file=envs/paper.tfvars -no-color 2>&1 | tee /tmp/plan.txt
          EXIT=${PIPESTATUS[0]}
          # exit 0 = no changes, 1 = error, 2 = changes detected
          if [ $EXIT -eq 2 ]; then
            echo "drift=true" >> $GITHUB_OUTPUT
          elif [ $EXIT -eq 1 ]; then
            echo "drift=error" >> $GITHUB_OUTPUT
          else
            echo "drift=false" >> $GITHUB_OUTPUT
          fi
          # Propagate the exit code — drift (2) and errors (1) both fail the job
          exit $EXIT

      - name: Summary
        if: always()
        run: |
          echo "### Terraform Drift Check (paper)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.drift.outputs.drift }}" = "true" ]; then
            echo "❌ **State drift detected** — paper environment has unapplied changes:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E '^  [#~+-]|Plan:' /tmp/plan.txt | head -30 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Run \`terraform apply -var-file=envs/paper.tfvars\` to reconcile, or fix the config." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.drift.outputs.drift }}" = "error" ]; then
            echo "❌ **Terraform plan failed** — check logs" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No drift — paper environment matches Terraform config" >> $GITHUB_STEP_SUMMARY
          fi

  # ── EventBridge schedule health check ──────────────────────────────────────
  eventbridge-health:
    name: EventBridge Schedule Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Verify EventBridge schedules exist and are ENABLED
        run: |
          set -euo pipefail
          ERRORS=0

          for ENV in paper production; do
            for ACTION in start stop; do
              SCHED_NAME="trading-bot-${ENV}-${ACTION}"
              echo "Checking $SCHED_NAME ..."

              STATE=$(aws scheduler get-schedule --name "$SCHED_NAME" \
                --query 'State' --output text 2>/dev/null || echo "NOT_FOUND")

              if [ "$STATE" = "NOT_FOUND" ]; then
                echo "::error::Schedule $SCHED_NAME does not exist"
                ERRORS=$((ERRORS+1))
                continue
              fi

              if [ "$STATE" != "ENABLED" ]; then
                echo "::error::Schedule $SCHED_NAME is $STATE (expected ENABLED)"
                ERRORS=$((ERRORS+1))
                continue
              fi

              # Verify cron expression is present
              CRON=$(aws scheduler get-schedule --name "$SCHED_NAME" \
                --query 'ScheduleExpression' --output text)
              echo "  State=$STATE  Cron=$CRON"

              # Verify the target sets DesiredCount correctly
              DESIRED=$(aws scheduler get-schedule --name "$SCHED_NAME" \
                --query 'Target.Input' --output text | python3 -c \
                "import json,sys; print(json.loads(sys.stdin.read()).get('DesiredCount','MISSING'))")

              if [ "$ACTION" = "start" ] && [ "$DESIRED" != "1" ]; then
                echo "::error::$SCHED_NAME sets DesiredCount=$DESIRED (expected 1)"
                ERRORS=$((ERRORS+1))
              elif [ "$ACTION" = "stop" ] && [ "$DESIRED" != "0" ]; then
                echo "::error::$SCHED_NAME sets DesiredCount=$DESIRED (expected 0)"
                ERRORS=$((ERRORS+1))
              else
                echo "  DesiredCount=$DESIRED \u2705"
              fi
            done
          done

          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS schedule issue(s) detected — fix before this causes a silent outage"
            exit 1
          fi
          echo "All 4 EventBridge schedules healthy"

      - name: Verify ECS services are reachable by schedules
        run: |
          set -euo pipefail
          ERRORS=0

          for ENV in paper production; do
            CLUSTER="trading-bot-${ENV}-cluster"
            SERVICE="trading-bot-${ENV}-service"
            echo "Checking $CLUSTER / $SERVICE ..."

            STATUS=$(aws ecs describe-services --cluster "$CLUSTER" \
              --services "$SERVICE" \
              --query 'services[0].status' --output text 2>/dev/null || echo "NOT_FOUND")

            if [ "$STATUS" = "NOT_FOUND" ] || [ "$STATUS" = "None" ]; then
              echo "::error::ECS service $SERVICE not found in cluster $CLUSTER"
              ERRORS=$((ERRORS+1))
              continue
            fi

            if [ "$STATUS" != "ACTIVE" ]; then
              echo "::error::ECS service $SERVICE status is $STATUS (expected ACTIVE)"
              ERRORS=$((ERRORS+1))
              continue
            fi

            # Verify IAM role for EventBridge can reach this service
            ROLE_NAME="trading-bot-${ENV}-eventbridge"
            ROLE_EXISTS=$(aws iam get-role --role-name "$ROLE_NAME" \
              --query 'Role.Arn' --output text 2>/dev/null || echo "NOT_FOUND")

            if [ "$ROLE_EXISTS" = "NOT_FOUND" ]; then
              echo "::error::IAM role $ROLE_NAME not found — EventBridge cannot scale ECS"
              ERRORS=$((ERRORS+1))
            else
              echo "  Service=$STATUS  Role=$ROLE_EXISTS \u2705"
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS ECS issue(s) detected"
            exit 1
          fi
          echo "All ECS services and IAM roles healthy"

      - name: Summary
        if: always()
        run: |
          echo "### EventBridge Schedule Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Schedule | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for ENV in paper production; do
            for ACTION in start stop; do
              SCHED_NAME="trading-bot-${ENV}-${ACTION}"
              STATE=$(aws scheduler get-schedule --name "$SCHED_NAME" \
                --query 'State' --output text 2>/dev/null || echo "NOT_FOUND")
              if [ "$STATE" = "ENABLED" ]; then
                echo "| $SCHED_NAME | \u2705 ENABLED |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $SCHED_NAME | \u274c $STATE |" >> $GITHUB_STEP_SUMMARY
              fi
            done
          done

  # ── Smoke-test the Gmail draft Lambda after every push to main ──
  smoke-test-lambda:
    name: Invoke Daily Summary Lambda (smoke test)
    needs: [lint, leakage-tests, terraform-drift, eventbridge-health]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Invoke trading-gmail-draft Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1
        run: |
          # Skip gracefully if AWS credentials are not configured yet
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "AWS credentials not configured — skipping Lambda smoke test"
            echo "Add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY to GitHub Secrets"
            exit 0
          fi

          echo "Invoking trading-gmail-draft Lambda..."
          RESPONSE=$(aws lambda invoke \
            --function-name trading-gmail-draft \
            --payload '{"source": "ci_smoke_test", "triggered_by": "leakage-audit"}' \
            --region eu-north-1 \
            --cli-read-timeout 60 \
            /tmp/lambda_response.json 2>&1) || true

          echo "AWS CLI output: $RESPONSE"

          if [ -f /tmp/lambda_response.json ]; then
            echo "Lambda response:"
            cat /tmp/lambda_response.json
            echo ""

            # Check for function error
            if echo "$RESPONSE" | grep -q '"FunctionError"'; then
              echo "::warning::Lambda returned a function error — check CloudWatch logs"
              echo "This does not fail the build (Lambda may not be deployed yet)"
            else
              echo "Lambda smoke test passed"
            fi
          else
            echo "::warning::Could not invoke Lambda — it may not be deployed yet"
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Lambda Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/lambda_response.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat /tmp/lambda_response.json >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Lambda not invoked (credentials missing or function not deployed)." >> $GITHUB_STEP_SUMMARY
          fi
