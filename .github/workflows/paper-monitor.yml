name: Paper Trading Monitor

on:
  schedule:
    # Every Sunday at 18:00 UTC (21:00 EEST) — after the trading week ends
    - cron: "0 18 * * 0"
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  update-scorecard:
    name: Evaluate Go-Live Criteria & Update README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install --quiet numpy pandas

      # ── Fetch latest paper state from Alpaca if credentials exist ──
      - name: Fetch paper state from Alpaca
        if: env.ALPACA_API_KEY != ''
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: |
          pip install --quiet alpaca-py
          python - << 'PYEOF'
          import json, os, sys
          from pathlib import Path
          from datetime import datetime, timezone

          state_path = Path("results/paper_state.json")

          # Load existing state if present in repo
          if state_path.exists():
              state = json.load(open(state_path))
          else:
              state = {"equity_history": [], "initial_equity": 25000}

          try:
              from alpaca.trading.client import TradingClient
              client = TradingClient(
                  api_key=os.environ["ALPACA_API_KEY"],
                  secret_key=os.environ["ALPACA_API_SECRET"],
                  paper=True,
              )
              account = client.get_account()
              equity = float(account.equity)
              today = datetime.now(timezone.utc).strftime("%Y-%m-%d")

              # Append today's equity (deduplicate if already present)
              history = state.get("equity_history", [])
              existing_dates = {e["date"] for e in history}
              if today not in existing_dates:
                  history.append({"date": today, "equity": equity})
                  state["equity_history"] = history
                  state_path.parent.mkdir(parents=True, exist_ok=True)
                  with open(state_path, "w") as f:
                      json.dump(state, f, indent=2)
                  print(f"Alpaca snapshot: ${equity:,.2f} on {today}")
              else:
                  print(f"Already have data for {today}, skipping")
          except Exception as e:
              print(f"Alpaca fetch skipped: {e}")
              if not state.get("equity_history"):
                  print("No paper_state.json and no Alpaca — scorecard will show Pending")
          PYEOF

      # ── Run the monitor ──
      - name: Run paper_monitor.py
        run: python scripts/paper_monitor.py --update-readme --verbose

      # ── Email alert if any criterion is FAILING ──
      - name: Check for FAILING criteria and send alert
        if: always() && hashFiles('results/paper_monitor.json') != ''
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
        run: |
          python - << 'PYEOF'
          import json, os, smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          sc = json.load(open("results/paper_monitor.json"))
          failing = [c for c in sc["criteria"] if c["status"] == "FAILING"]

          if not failing:
              print("All criteria PASSED or Pending — no alert needed")
              raise SystemExit(0)

          smtp_user = os.environ.get("SMTP_USER", "")
          smtp_pass = os.environ.get("SMTP_PASSWORD", "")
          if not smtp_user or not smtp_pass:
              print("SMTP credentials not configured — skipping email alert")
              print("Set SMTP_USER and SMTP_APP_PASSWORD in GitHub Secrets")
              raise SystemExit(0)

          recipients = ["kiritsis.di@gmail.com", "o.zoumpou@gmail.com"]
          n_fail = len(failing)
          n_total = len(sc["criteria"])
          metrics = sc.get("metrics", {})

          # Build HTML email
          rows = ""
          for c in sc["criteria"]:
              colour = "#f85149" if c["status"] == "FAILING" else (
                  "#3fb950" if c["status"] == "PASSED" else "#8b949e"
              )
              icon = "\u2717" if c["status"] == "FAILING" else (
                  "\u2713" if c["status"] == "PASSED" else "\u2014"
              )
              rows += (
                  f'<tr style="border-bottom:1px solid #30363d;">'
                  f'<td style="padding:8px;">{c["index"]}</td>'
                  f'<td style="padding:8px;">{c["metric"]}</td>'
                  f'<td style="padding:8px;">{c["threshold"]}</td>'
                  f'<td style="padding:8px;">{c["current"]}</td>'
                  f'<td style="padding:8px;color:{colour};font-weight:bold;">{icon} {c["status"]}</td>'
                  f'</tr>'
              )

          eq = metrics.get("current_equity")
          eq_str = f"${eq:,.2f}" if eq else "N/A"
          dd = metrics.get("max_drawdown_pct")
          dd_str = f"{dd:.2f}%" if dd is not None else "N/A"

          html = f"""
          <html><body style="font-family:'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;padding:20px;">
          <h1 style="color:#f85149;border-bottom:1px solid #30363d;padding-bottom:10px;">
            \u26a0\ufe0f Paper Trading Alert — {n_fail} Criterion{'s' if n_fail > 1 else ''} FAILING
          </h1>
          <p style="color:#8b949e;">Weekly scorecard: {sc["summary"]} | Run: {sc.get("run_date", "N/A")}</p>
          <p>Equity: <strong>{eq_str}</strong> | Max DD: <strong>{dd_str}</strong></p>
          <table style="border-collapse:collapse;width:100%;margin-top:16px;">
            <tr style="background:#161b22;">
              <th style="padding:10px;text-align:left;color:#58a6ff;">#</th>
              <th style="padding:10px;text-align:left;color:#58a6ff;">Metric</th>
              <th style="padding:10px;text-align:left;color:#58a6ff;">Threshold</th>
              <th style="padding:10px;text-align:left;color:#58a6ff;">Current</th>
              <th style="padding:10px;text-align:left;color:#58a6ff;">Status</th>
            </tr>
            {rows}
          </table>
          <h3 style="color:#f85149;margin-top:24px;">Failing Criteria:</h3>
          <ul>
          {chr(10).join(f'<li><strong>{c["metric"]}</strong>: {c["current"]} (need {c["threshold"]})</li>' for c in failing)}
          </ul>
          <p style="color:#8b949e;font-size:12px;margin-top:30px;">
            Auto-generated by Paper Trading Monitor | <a href="https://github.com/jimKir/automated-trading" style="color:#58a6ff;">View Repository</a>
          </p>
          </body></html>
          """

          subject = f"\u26a0\ufe0f [Trading Alert] {n_fail}/{n_total} Go-Live Criteria FAILING"

          for recipient in recipients:
              msg = MIMEMultipart("alternative")
              msg["Subject"] = subject
              msg["From"] = smtp_user
              msg["To"] = recipient
              msg.attach(MIMEText(html, "html"))

              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
                  server.login(smtp_user, smtp_pass)
                  server.sendmail(smtp_user, recipient, msg.as_string())
              print(f"Alert email sent to {recipient}")
          PYEOF

      # ── Commit if there are changes ──
      - name: Commit updated README and scorecard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md results/paper_monitor.json results/paper_state.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(auto): update paper trading scorecard [skip ci]"
            git push origin main
            echo "Scorecard committed and pushed"
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Paper Trading Scorecard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/paper_monitor.json ]; then
            python - << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json
          sc = json.load(open("results/paper_monitor.json"))
          print(f"**{sc['summary']}** | Go-live ready: {'Yes' if sc['go_live_ready'] else 'No'}")
          print("")
          print("| # | Metric | Threshold | Current | Status |")
          print("|---|---|---|---|---|")
          for c in sc["criteria"]:
              print(f"| {c['index']} | {c['metric']} | {c['threshold']} | {c['current']} | {c['status']} |")
          PYEOF
          else
            echo "No scorecard generated — paper trading not yet started." >> $GITHUB_STEP_SUMMARY
          fi
